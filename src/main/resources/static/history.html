<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Virtual Banking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background-color: #1a73e8;
            padding: 24px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-header {
            padding: 9px 20px;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
            white-space: nowrap;
        }

        .btn-header:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
        }

        .content {
            padding: 30px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .history-table thead {
            background-color: #1a73e8;
            color: white;
        }

        .history-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        .history-table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .history-table tbody tr:last-child {
            border-bottom: none;
        }

        .history-table tbody tr:hover {
            background-color: #f0f6ff;
        }

        .history-table td {
            padding: 13px 16px;
            font-size: 14px;
            color: #333;
        }

        .history-table td:first-child {
            font-weight: 600;
            color: #1a73e8;
            width: 60px;
        }

        .history-table td:nth-child(2) {
            color: #555;
            word-break: break-word;
        }

        .date {
            color: #999;
            font-size: 12px;
            white-space: nowrap;
        }

        .history-empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 15px;
        }

        .history-empty::before {
            content: '📋';
            display: block;
            font-size: 44px;
            margin-bottom: 12px;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #f0f0f0;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 12px; text-align: center; }
            .header h1 { font-size: 20px; }
            .history-table th, .history-table td { padding: 10px; font-size: 12px; }
            .content { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Transaction History</h1>
        <button class="btn-header" onclick="goBackToAdmin()">← Back</button>
    </div>

    <div class="content">
        <div id="historyMessage" class="history-empty" style="display:none"></div>
        <div class="table-wrapper">
            <table class="history-table" id="historyTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Description</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="3" class="history-empty">Loading history...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">© 2025 Virtual Banking System</div>
</div>

<script>
    const API_URL = 'http://localhost:8081';
    let userId = null;

    function getUserIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        const urlUserId = params.get('id');
        const storedUserId = localStorage.getItem('userId');
        userId = storedUserId || urlUserId;
    }

    function goBackToAdmin() {
        const params = new URLSearchParams();
        if (userId) params.set('id', userId);
        params.set('role', 'admin');
        window.location.href = `admin.html?${params.toString()}`;
    }

    async function loadHistories() {
        try {
            const res = await fetch(`${API_URL}/histories`);
            if (!res.ok) throw new Error('Failed to load histories');
            const histories = await res.json();
            renderHistories(histories);
        } catch (err) {
            console.error(err);
            const body = document.getElementById('historyBody');
            body.innerHTML = `<tr><td colspan="3" class="history-empty">Unable to load history. Ensure backend is running.</td></tr>`;
        }
    }

    function renderHistories(list) {
        const body = document.getElementById('historyBody');
        if (!list || list.length === 0) {
            body.innerHTML = `<tr><td colspan="3" class="history-empty">No history records found.</td></tr>`;
            return;
        }
        body.innerHTML = list.map(h => `
            <tr>
                <td>#${h.id}</td>
                <td>${escapeHtml(h.description)}</td>
                <td class="date">${formatDate(h.date)}</td>
            </tr>
        `).join('');
    }

    function formatDate(d) {
        if (!d) return '';
        const dt = new Date(d);
        if (isNaN(dt)) return d;
        return dt.toLocaleString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(c) {
            return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c];
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        getUserIdFromURL();
        loadHistories();
    });
</script>
</body>
</html>
