<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Banking System - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background-color: #1a73e8;
            padding: 24px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 3px;
        }

        .header-left p {
            font-size: 13px;
            opacity: 0.85;
        }

        .logout-btn {
            padding: 9px 20px;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
        }

        .content {
            padding: 30px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .dashboard-header h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 4px;
        }

        .dashboard-header p {
            color: #888;
            font-size: 13px;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        .account-balance {
            background-color: #1a73e8;
            color: white;
            padding: 28px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 24px;
        }

        .account-balance p {
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 38px;
            font-weight: 700;
        }

        .transaction-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .btn-withdraw {
            background-color: #e53935;
        }

        .btn-withdraw:hover {
            box-shadow: 0 8px 20px rgba(229, 57, 53, 0.35);
        }

        .btn-deposit {
            background-color: #00897b;
        }

        .btn-deposit:hover {
            box-shadow: 0 8px 20px rgba(0, 137, 123, 0.35);
        }

        .btn-transfer {
            background-color: #f57c00;
        }

        .btn-transfer:hover {
            box-shadow: 0 8px 20px rgba(245, 124, 0, 0.35);
        }

        .btn-passbook {
            background-color: #1a73e8;
        }

        .btn-passbook:hover {
            box-shadow: 0 8px 20px rgba(26, 115, 232, 0.35);
        }

        .btn-update {
            background-color: #6d4c41;
        }

        .btn-update:hover {
            box-shadow: 0 8px 20px rgba(109, 76, 65, 0.35);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
            background: white;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-modal {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-submit {
            background-color: #1a73e8;
            color: white;
        }

        .btn-submit:hover {
            background-color: #1558b0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.3);
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #f0f0f0;
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; gap: 12px; text-align: center; }
            .transaction-buttons { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>VBS</h1>
            <p>Virtual Banking System</p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="content">
        <div class="dashboard-header">
            <h2 id="welcomeText">Welcome</h2>
            <p>User ID: <strong><span id="userId">-</span></strong></p>
        </div>

        <div id="dashMessage" class="message"></div>

        <div class="account-balance">
            <p>Available Balance</p>
            <div class="balance-amount">₹ <span id="balance">0.00</span></div>
        </div>

        <div class="transaction-buttons">
            <button class="btn btn-withdraw" onclick="openWithdrawModal()">Withdraw</button>
            <button class="btn btn-deposit" onclick="openDepositModal()">Deposit</button>
            <button class="btn btn-transfer" onclick="openTransferModal()">Transfer</button>
            <button class="btn btn-passbook" onclick="goToPassbook()">Passbook</button>
            <button class="btn btn-update" onclick="openUpdateModal()">Update Profile</button>
        </div>
    </div>

    <div class="footer">© 2025 Virtual Banking System</div>
</div>

<!-- Withdraw Modal -->
<div id="withdrawModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Withdraw Funds</div>
        <form id="withdrawForm">
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="withdrawAmount" step="0.01" min="0" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="closeWithdrawModal()">Cancel</button>
                <button type="submit" class="btn-modal btn-submit">Withdraw</button>
            </div>
        </form>
    </div>
</div>

<!-- Deposit Modal -->
<div id="depositModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Deposit Funds</div>
        <form id="depositForm">
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="depositAmount" step="0.01" min="0" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="closeDepositModal()">Cancel</button>
                <button type="submit" class="btn-modal btn-submit">Deposit</button>
            </div>
        </form>
    </div>
</div>

<!-- Transfer Modal -->
<div id="transferModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Transfer Funds</div>
        <form id="transferForm">
            <div class="form-group">
                <label>Recipient Username</label>
                <input type="text" id="transferUsername" required>
            </div>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="transferAmount" step="0.01" min="0" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="closeTransferModal()">Cancel</button>
                <button type="submit" class="btn-modal btn-submit">Send</button>
            </div>
        </form>
    </div>
</div>

<!-- Update Modal -->
<div id="updateModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Update Profile</div>
        <form id="updateForm">
            <div class="form-group">
                <label>Field</label>
                <select id="updateKey" required>
                    <option value="name">Name</option>
                    <option value="password">Password</option>
                    <option value="email">Email</option>
                </select>
            </div>
            <div class="form-group">
                <label>New Value</label>
                <input type="text" id="updateValue" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="closeUpdateModal()">Cancel</button>
                <button type="submit" class="btn-modal btn-submit">Update</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8081';
    let userId = null;
    let role = 'customer';

    function validateUserAccess() {
        const storedUserId = localStorage.getItem("userId");
        const storedRole = localStorage.getItem("role") || "customer";
        const params = new URLSearchParams(window.location.search);
        const urlUserId = params.get("id");

        if (!storedUserId) { window.location.href = "login.html"; return; }
        if (urlUserId && urlUserId !== storedUserId) {
            alert("Unauthorized access detected!");
            window.location.href = "login.html";
            return;
        }

        userId = storedUserId;
        role = storedRole;
        window.history.replaceState({}, document.title, "dashboard.html");
    }

    async function loadDashboard() {
        document.getElementById('userId').textContent = userId;
        try {
            const res = await fetch(`${API_URL}/get-details/${userId}`);
            const data = await res.json();
            document.getElementById('welcomeText').textContent = `Welcome, ${data.username}`;
            document.getElementById('balance').textContent = data.balance.toFixed(2);
        } catch {
            showMessage('dashMessage', 'Failed to load dashboard', 'error');
        }
    }

    function showMessage(elementId, message, type) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.className = `message ${type} show`;
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    function openWithdrawModal() { document.getElementById('withdrawModal').classList.add('show'); }
    function closeWithdrawModal() { document.getElementById('withdrawModal').classList.remove('show'); document.getElementById('withdrawForm').reset(); }
    function openDepositModal() { document.getElementById('depositModal').classList.add('show'); }
    function closeDepositModal() { document.getElementById('depositModal').classList.remove('show'); document.getElementById('depositForm').reset(); }
    function openTransferModal() { document.getElementById('transferModal').classList.add('show'); }
    function closeTransferModal() { document.getElementById('transferModal').classList.remove('show'); document.getElementById('transferForm').reset(); }
    function openUpdateModal() { document.getElementById('updateModal').classList.add('show'); }
    function closeUpdateModal() { document.getElementById('updateModal').classList.remove('show'); document.getElementById('updateForm').reset(); }
    function logout() { window.location.href = 'home.html'; }
    function goToPassbook() { window.location.href = `passbook.html?id=${userId}&role=${encodeURIComponent(role)}`; }

    document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const withdrawData = { id: parseInt(userId), amount: parseFloat(document.getElementById('withdrawAmount').value) };
        try {
            const response = await fetch(`${API_URL}/withdraw`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(withdrawData) });
            const result = await response.text();
            if (result && result.toLowerCase().includes('withdrawal')) {
                showMessage('dashMessage', 'Withdrawal successful!', 'success');
                closeWithdrawModal(); loadDashboard();
            } else { showMessage('dashMessage', result || 'Withdrawal failed', 'error'); }
        } catch { showMessage('dashMessage', 'Error processing withdrawal', 'error'); }
    });

    document.getElementById('depositForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const depositData = { id: parseInt(userId), amount: parseFloat(document.getElementById('depositAmount').value) };
        try {
            const response = await fetch(`${API_URL}/deposit`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(depositData) });
            const result = await response.text();
            if (result && result.toLowerCase().includes('deposit')) {
                showMessage('dashMessage', 'Deposit successful!', 'success');
                closeDepositModal(); loadDashboard();
            } else { showMessage('dashMessage', result || 'Deposit failed', 'error'); }
        } catch { showMessage('dashMessage', 'Error processing deposit', 'error'); }
    });

    document.getElementById('transferForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const transferData = { id: parseInt(userId), amount: parseFloat(document.getElementById('transferAmount').value), username: document.getElementById('transferUsername').value };
        if (!transferData.username) { showMessage('dashMessage', 'Enter recipient username.', 'error'); return; }
        try {
            const response = await fetch(`${API_URL}/transfer`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(transferData) });
            const result = await response.text();
            if (response.ok && result && result.toLowerCase().includes('successfully')) {
                showMessage('dashMessage', 'Transfer successful!', 'success');
                closeTransferModal(); loadDashboard();
            } else { showMessage('dashMessage', result || 'Transfer failed', 'error'); }
        } catch { showMessage('dashMessage', 'Error processing transfer', 'error'); }
    });

    document.getElementById('updateForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const updateData = { id: parseInt(userId), key: document.getElementById('updateKey').value, value: document.getElementById('updateValue').value };
        try {
            const response = await fetch(`${API_URL}/update`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updateData) });
            const result = await response.text();
            if (response.ok && result && result.toLowerCase().includes('successfully')) {
                showMessage('dashMessage', 'Profile updated successfully!', 'success');
                closeUpdateModal(); loadDashboard();
            } else { showMessage('dashMessage', result || 'Update failed', 'error'); }
        } catch { showMessage('dashMessage', 'Error updating profile', 'error'); }
    });

    window.addEventListener('click', (e) => {
        ['withdrawModal','depositModal','transferModal','updateModal'].forEach(id => {
            const modal = document.getElementById(id);
            if (e.target === modal) modal.classList.remove('show');
        });
    });

    window.addEventListener('DOMContentLoaded', () => {
        validateUserAccess();
        loadDashboard();
    });
</script>
</body>
</html>
